GLOBAL:
    LOG_LEVEL: 2
    GPU_INDICES:
    - 0
    RANDOM_SEED: 0
    ANOMALY_DETECTION: false
    FILTER_WARNINGS: true
    METHOD_TYPE: FasterGSBasisRapid
    DATASET_TYPE: MipNeRF360
EXPERIMENT:
    VERSION: fastergsbasisrapid-v0.3.0
    BASELINE: RapidGS train_big.sh bicycle
    CHANGELOG: src/Methods/FasterGSBasisRapid/CHANGELOG.md
    NOTES: v0.2.1 train_big alignment plus three-window CUDA event profiler.
MODEL:
    SH_DEGREE: 3
RENDERER:
    CLAMP_IMAGE_TRAINING: false
    SCALE_MODIFIER: 1.0
    COMPACT_BOX_MULT: 0.5
TRAINING:
    LOAD_CHECKPOINT: null
    MODEL_NAME: bicycle
    NUM_ITERATIONS: 30000
    RUN_VALIDATION: false
    DATA:
        PRELOADING_LEVEL: 1
        FIELDS: []
        PRECOMPUTE_RAYS: false
        RAYS_TO_DEVICE: true
    BACKUP:
        FINAL_CHECKPOINT: true
        RENDER_TESTSET: true
        RENDER_TRAINSET: false
        RENDER_VALSET: false
        INTERMEDIATE_RENDERINGS: true
        VISUALIZE_ERRORS: false
        INTERVAL: -1
        TRAINING_STATE: false
    TIMING:
        ACTIVATE: false
        INCLUDE_DATALOADING_IN_TOTAL: true
        INCLUDE_PRETRAINING_IN_TOTAL: true
        INCLUDE_POSTTRAINING_IN_TOTAL: false
    WANDB:
        ACTIVATE: false
        ENTITY: null
        PROJECT: nerficg
        LOG_IMAGES: true
        INDEX_VALIDATION: -1
        INDEX_TRAINING: -1
        INTERVAL: 1000
        SWEEP_MODE:
            ACTIVE: false
            START_ITERATION: 999
            ITERATION_STRIDE: 1000
            NUM_IMAGES: -1
    WRITE_VRAM_STATS: false
    GUI:
        ACTIVATE: false
        RENDER_INTERVAL: 5
        GUI_STATUS_ENABLED: true
        GUI_STATUS_INTERVAL: 20
        SKIP_GUI_SETUP: false
        FPS_ROLLING_AVERAGE_SIZE: 100
    DENSIFICATION_START_ITERATION: 600
    DENSIFICATION_END_ITERATION: 14900
    DENSIFICATION_INTERVAL: 100
    DENSIFICATION_GRAD_THRESHOLD: 0.0002
    DENSIFICATION_ABS_GRAD_THRESHOLD: 0.0008
    DENSIFICATION_PERCENT_DENSE: 0.001
    OPACITY_RESET_INTERVAL: 3000
    EXTRA_OPACITY_RESET_ITERATION: 500
    MIN_OPACITY_AFTER_TRAINING: 0.00392156862745098
    FASTGS_SCORE_VIEWS: 10
    FASTGS_LOSS_THRESHOLD: 0.1
    FASTGS_IMPORTANCE_THRESHOLD: 5.0
    FASTGS_PRUNING_START_ITERATION: 18000
    FASTGS_PRUNING_END_ITERATION: 27000
    FASTGS_PRUNING_INTERVAL: 3000
    FASTGS_PRUNING_MIN_OPACITY: 0.1
    FASTGS_PRUNING_SCORE_THRESHOLD: 0.9
    PROFILER:
        ACTIVE: true
        WINDOWS:
        - - 1000
          - 1100
        - - 14000
          - 14100
        - - 25000
          - 25100
    LOSS:
        LAMBDA_L1: 0.8
        LAMBDA_DSSIM: 0.2
    OPTIMIZER:
        LEARNING_RATE_MEANS_INIT: 0.00016
        LEARNING_RATE_MEANS_FINAL: 1.6e-06
        LEARNING_RATE_MEANS_MAX_STEPS: 30000
        LEARNING_RATE_SH_COEFFICIENTS_0: 0.0025
        LEARNING_RATE_SH_COEFFICIENTS_REST: 0.00025
        LEARNING_RATE_OPACITIES: 0.025
        LEARNING_RATE_SCALES: 0.005
        LEARNING_RATE_ROTATIONS: 0.001
        SH_REST_UPDATE_INTERVAL: 16
        LATE_UPDATE_START_ITERATION: 15000
        LATE_UPDATE_INTERVAL: 32
        FINAL_UPDATE_START_ITERATION: 20000
        FINAL_UPDATE_INTERVAL: 64
DATASET:
    PATH: dataset/mipnerf360/bicycle
    IMAGE_SCALE_FACTOR: 0.3234937323
    NORMALIZE_CUBE: null
    NORMALIZE_RECENTER: false
    BACKGROUND_COLOR:
    - 0.0
    - 0.0
    - 0.0
    NEAR_PLANE: 0.01
    FAR_PLANE: 100.0
    TEST_STEP: 8
    APPLY_PCA: true
    APPLY_PCA_RESCALE: true
